<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Exercise 12</title>

<style>
body{
    font-family: Arial;
    background-color: #f0f8ff;
}

.form-box{
    width: 400px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 5px 10px rgba(0,0,0,0.2);
}

h1{
    text-align: center;
}

input, textarea, select{
    width: 100%;
    margin-top: 5px;
    margin-bottom: 10px;
}
</style>

</head>

<body>

<div class="form-box">

<h1>Student Form</h1>

<form>

Name:
<input type="text"><br>

Student ID:
<input type="text"><br>

Gender:<br>
<input type="radio" name="gender"> Male<br>
<input type="radio" name="gender"> Female<br>

Hobby:<br>
<input type="checkbox"> Music<br>
<input type="checkbox"> Sports<br>
<input type="checkbox"> Game<br>

Comment:<br>
<textarea rows="4"></textarea><br>

<input type="submit" value="Submit">

</form>

</div>

</body>
</html>
